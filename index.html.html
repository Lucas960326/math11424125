<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>иіӘйҮҸ-еҪҲз°§-йҳ»е°јзі»зөұжЁЎж“¬еҷЁ - й„ӯеҗ‘жҒҶ</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid #3498db; margin-bottom: 20px; padding-bottom: 10px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; background: #eef2f5; padding: 15px; border-radius: 8px; }
        .control-group { display: flex; flex-direction: column; }
        canvas { background: #fff; border: 1px solid #ddd; display: block; margin: 0 auto; border-radius: 4px; }
        .info { font-size: 0.9em; color: #555; margin-top: 10px; }
        button { background: #f39c12; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #e67e22; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>иіӘйҮҸ-еҪҲз°§-йҳ»е°јзі»зөұдә’еӢ•жЁЎж“¬еҷЁ</h2>
        <p><strong>еӯёз”ҹиіҮиЁҠпјҡ</strong> й„ӯеҗ‘жҒҶ (11424125)</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label id="c-label">йҳ»е°јдҝӮж•ё (c): 5.0</label>
            <input type="range" id="c-slider" min="0" max="50" step="0.5" value="5">
        </div>
        <div class="control-group">
            <label id="w-label">еӨ–еҠӣй »зҺҮ (Пү): 1.0</label>
            <input type="range" id="w-slider" min="0" max="10" step="0.1" value="1">
        </div>
        <div class="control-group" style="grid-column: span 2;">
            <button onclick="setResonance()">иҮӘеӢ•е…ұжҢҜ (Пү = ПүвӮҷ)</button>
            <div class="info" id="phys-info">иҮӘз„¶й »зҺҮ (ПүвӮҷ): 2.236 | йҳ»е°јжҜ” (О¶): 0.158</div>
        </div>
    </div>

    <canvas id="simCanvas" width="800" height="150"></canvas>
    <div id="plot" style="width:100%;height:350px;"></div>
</div>

<script>
    // зү©зҗҶеҸғж•ё
    const m = 10, k = 50, F0 = 100;
    const wn = Math.sqrt(k / m);
    let c = 5, w = 1;
    let t = 0;
    let xData = [], tData = [];

    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const cSlider = document.getElementById('c-slider');
    const wSlider = document.getElementById('w-slider');

    function setResonance() {
        wSlider.value = wn.toFixed(1);
        w = wn;
        updateLabels();
    }

    function updateLabels() {
        c = parseFloat(cSlider.value);
        w = parseFloat(wSlider.value);
        let zeta = c / (2 * Math.sqrt(k * m));
        document.getElementById('c-label').innerText = `йҳ»е°јдҝӮж•ё (c): ${c.toFixed(1)}`;
        document.getElementById('w-label').innerText = `еӨ–еҠӣй »зҺҮ (Пү): ${w.toFixed(1)}`;
        document.getElementById('phys-info').innerText = `иҮӘз„¶й »зҺҮ (ПүвӮҷ): ${wn.toFixed(3)} | йҳ»е°јжҜ” (О¶): ${zeta.toFixed(3)}`;
    }

    cSlider.oninput = updateLabels;
    wSlider.oninput = updateLabels;

    function drawSimulation(x) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let centerX = canvas.width / 2 + x * 15; // ж”ҫеӨ§дҪҚз§»ж–№дҫҝи§ҖеҜҹ

        // з•«зүҶеЈҒ
        ctx.fillStyle = '#333';
        ctx.fillRect(0, 20, 10, 110);

        // з•«еҪҲз°§
        ctx.beginPath();
        ctx.strokeStyle = '#888';
        ctx.moveTo(10, 75);
        for (let i = 0; i < 20; i++) {
            let px = 10 + (i * (centerX - 30) / 20);
            let py = 75 + (i % 2 === 0 ? 10 : -10);
            ctx.lineTo(px, py);
        }
        ctx.lineTo(centerX - 20, 75);
        ctx.stroke();

        // з•«иіӘйҮҸеЎҠ
        ctx.fillStyle = '#3498db';
        ctx.fillRect(centerX - 20, 50, 40, 50);
        ctx.fillStyle = 'white';
        ctx.fillText("m=10", centerX - 15, 80);
    }

    function step() {
        t += 0.05;
        
        // еј·иҝ«жҢҜеӢ•и§Јжһҗи§Ј: m*x'' + c*x' + k*x = F0*sin(w*t)
        let denom = Math.sqrt(Math.pow(k - m*w*w, 2) + Math.pow(c*w, 2)) || 0.001;
        let amplitude = F0 / denom;
        let phase = Math.atan2(c*w, k - m*w*w);
        let x = amplitude * Math.sin(w*t - phase);

        drawSimulation(x);

        // жӣҙж–°ең–иЎЁ
        tData.push(t);
        xData.push(x);
        if (tData.length > 200) { tData.shift(); xData.shift(); }

        Plotly.relayout('plot', { 'xaxis.range': [t - 10, t] });
        Plotly.restyle('plot', { x: [tData], y: [xData] });

        requestAnimationFrame(step);
    }

    // еҲқе§ӢеҢ– Plotly ең–иЎЁ
    Plotly.newPlot('plot', [{
        x: tData, y: xData,
        mode: 'lines',
        line: { color: '#e74c3c', width: 2 }
    }], {
        title: 'дҪҚз§» vs жҷӮй–“ (Displacement vs Time)',
        xaxis: { title: 'жҷӮй–“ (s)', range: [0, 10] },
        yaxis: { title: 'дҪҚз§» (m)', range: [-25, 25] },
        margin: { t: 40, b: 40, l: 40, r: 20 }
    });

    step();
</script>

</body>
</html>yp
